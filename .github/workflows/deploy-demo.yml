name: Deploy Demo

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install root deps
        run: npm ci
      - name: Install poc deps
        run: npm ci
        working-directory: poc
      - name: Build demo
        run: npm run build
        working-directory: poc
        env:
          BASE_URL: /view-transition-router/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: poc/dist
      - uses: actions/deploy-pages@v4
        id: deployment
